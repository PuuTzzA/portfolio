<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sdf-ui.css">
    <title>Putzer Thomas</title>
</head>

<body>
    <sdf-light class="light" id="light-1" data-render-layers="0"></sdf-light>
    <sdf-light class="light" id="light-2" data-render-layers="1"></sdf-light>

    <div id="fps">10fps</div>


    <canvas id="background-canvas" class="middle-sizing"></canvas>

    <sdf-sphere id="cursor" data-layer-index="4" data-render-layers="0"></sdf-sphere>
    <!-- <div id="vis"></div> -->
    <div id="focused-area" class="no-sdf"></div>
    <canvas id="focus-canvas"></canvas>

    <sdf-box id="background-box" class="middle-sizing" data-layer-index="2" data-render-layers="1">
        <div class="header">
            <div class="appearance-settings-container">
                <div id="toggle-header" class="button-icon material-symbols-rounded">close</div>
                <div class="button-icon material-symbols-rounded">3d</div>
                <div class="button-icon material-symbols-rounded">routine</div>
            </div>

            <nav id="header-link-container" class="focusable show-header">
                <t-sdf-push-button content="About" link-href="#about" sdf-element-class="header-link-sdf-box"
                    sdf-negative-class="header-link-sdf-box"></t-sdf-push-button>
                <t-sdf-push-button content="Timeline" link-href="#timeline" sdf-element-class="header-link-sdf-box"
                    sdf-negative-class="header-link-sdf-box"></t-sdf-push-button>
                <t-sdf-push-button content="Projects" link-href="#projects" sdf-element-class="header-link-sdf-box"
                    sdf-negative-class="header-link-sdf-box"></t-sdf-push-button>
                <t-sdf-push-button content="Contact" link-href="#contact" sdf-element-class="header-link-sdf-box"
                    sdf-negative-class="header-link-sdf-box"></t-sdf-push-button>
            </nav>
            <!--             <sdf-box id="toggle-header" class="focusable button-icon material-symbols-rounded">close</sdf-box>
 -->
        </div>

        <div id="about" class="content-container">
            <div class="about-container">
                <div class="focusable">
                    <div>
                        <sdf-text class="no-sdf title-text" data-layer-index="1" data-render-layers="0">thomas
                            putzer</sdf-text>
                    </div>
                    <div class="about-section">
                        <div class="about-section-info">
                            <div class="main-info text">M.Sc. Student of Informatics: Games Engineering</div>
                            <div class="personal-information-container text-muted">
                                <t-span-with-icon title="" icon="location_on" content="Munich, Germany"
                                    space-between="false"></t-span-with-icon>
                                <t-span-with-icon title="" icon="bookmark"
                                    content="Computer Simulations, Graphics & Vision"
                                    space-between="false"></t-span-with-icon>
                            </div>
                        </div>
                        <div class="about-section-links">
                            <div class="icon-link mail-icon" aria-label="E-Mail"></div>
                            <div class="icon-link github-icon" aria-label="GitHub"></div>
                            <!-- <div class="icon-link youtube-icon" aria-label="GitHub"></div> -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="timeline" class="focusable">
                <div class="timeline-header">
                    <t-sdf-push-button content="Education" link-href="" sdf-element-class="timeline-header-items"
                        sdf-negative-class="timeline-header-items"></t-sdf-push-button>
                    <t-sdf-push-button content="Experience" link-href="" sdf-element-class="timeline-header-items"
                        sdf-negative-class="timeline-header-items"></t-sdf-push-button>

                    <!-- <div class="timeline-header-items chip-button text timeline-selected">Education</div>
                    <div class="timeline-header-items chip-button text">Experience</div> -->
                </div>
                <div class="timeline-content">
                    <div class="timeline-line"></div>


                    <t-timeline-entry title="Technical Univsersity of Munich" location="Munich, Germany"
                        from-year="2022" from-month="Sep" to-year="now" to-month=""
                        content="M.Sc. Informatics: Games Engineering"></t-timeline-entry>
                    <t-timeline-entry title="Technical Univsersity of Munich" location="Munich, Germany"
                        from-year="2022" from-month="Sep" to-year="2025" to-month="Oct" content="B.Sc. Informatics: Games Engineering<br>Thesis: Higher-Order Mass- and
                    Momentum-Conserving Advection for Fluid Simulations with Large Time Steps <br> GPA: 1.3
                    (Best 1.0)"></t-timeline-entry>
                    <t-timeline-entry title="Seoul National Univsersity" location="Seoul, South Korea" from-year="2024"
                        from-month="Sep" to-year="2025" to-month="Jan"
                        content="Exchange Semester at SNU."></t-timeline-entry>
                    <t-timeline-entry title="Technical Secondary School Bruneck" location="Bruneck, Italy"
                        from-year="2017" from-month="Sep" to-year="2022" to-month="Jun"
                        content="Branch: Electronics and Electrical Engineering, with the focus being on Automation.<br>Maturità (High School Diploma): 100/100 Points"></t-timeline-entry>
                </div>
            </div>

        </div>


        <div style="height: 100rem;"></div>
    </sdf-box>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@400" rel="stylesheet" />

    <script src="js/custom-elements.js" type="module"></script>
    <script src="sdf-ui/src/scripts/sdf-elements.js" type="module"></script>
    <script type="module" src="js/main.js"></script>
    <!--     <script type="module" src="js/adaptive.js"></script>
 -->
</body>

</html>
